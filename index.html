<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const a = document.getElementById('homeAudio');
  const playBtn = document.getElementById('playAudioBtn');
  const stopBtn = document.getElementById('stopAudioBtn');
  const gate = document.getElementById('audioGate');
  const gateBtn = document.getElementById('audioGateBtn');

  async function tryAutoplay(){
    if(!a) return;
    a.volume = 0.35;
    a.loop = true;
    try{
      await a.play();
      if(gate) gate.style.display="none";
    }catch(e){
      if(gate) gate.style.display="block";
    }
  }

  if(playBtn) playBtn.onclick = async ()=>{ a.currentTime=0; await a.play(); if(gate) gate.style.display="none"; };
  if(stopBtn) stopBtn.onclick = ()=>{ a.pause(); a.currentTime=0; };
  if(gateBtn) gateBtn.onclick = async ()=>{ await a.play(); if(gate) gate.style.display="none"; };

  setTimeout(tryAutoplay, 3000);
  document.addEventListener('pointerdown', ()=>{ if(a && a.paused) tryAutoplay(); }, { once: true });
</script>
